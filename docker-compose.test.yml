# Infrastructure only — no service containers.
# Tests boot the NestJS apps in-process via supertest.
# Run: docker compose -f docker-compose.test.yml up -d --wait

services:
  postgres-auth-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d auth_test']
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq-test:
    image: rabbitmq:3-management-alpine
    ports:
      - '5673:5672'
      - '15673:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
