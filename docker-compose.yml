services:
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AUTH_SERVICE_URL: http://auth-service:3001
      HOUSEHOLD_SERVICE_URL: http://household-service:3002
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      auth-service:
        condition: service_healthy
      household-service:
        condition: service_healthy
    networks:
      - familieoya

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgres://auth:auth@postgres-auth:5432/auth_db
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth -d auth_db']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - familieoya

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  household-service:
    build:
      context: .
      dockerfile: apps/household-service/Dockerfile
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: postgres://household:household@postgres-household:5432/household_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres-household:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      NODE_ENV: production
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3005/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  postgres-household:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: household_db
      POSTGRES_USER: household
      POSTGRES_PASSWORD: household
    volumes:
      - postgres-household-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U household -d household_db']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - familieoya

volumes:
  postgres-auth-data:
  postgres-household-data:

networks:
  familieoya:
    driver: bridge
