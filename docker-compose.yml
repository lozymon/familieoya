services:
  proxy:
    image: nginx:alpine
    ports:
      - '8000:80'
    volumes:
      - ./apps/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      shell:
        condition: service_started
      mfe-auth:
        condition: service_started
      mfe-transaction:
        condition: service_started
      mfe-household:
        condition: service_started
      mfe-budget:
        condition: service_started
      mfe-reports:
        condition: service_started
      mfe-settings:
        condition: service_started
    networks:
      - familieoya

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      PORT: 3000
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      AUTH_SERVICE_URL: http://auth-service:3001
      HOUSEHOLD_SERVICE_URL: http://household-service:3002
      TRANSACTION_SERVICE_URL: http://transaction-service:3003
      BUDGET_SERVICE_URL: http://budget-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      REPORT_SERVICE_URL: http://report-service:3006
      AUDIT_SERVICE_URL: http://audit-service:3007
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      auth-service:
        condition: service_healthy
      household-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      budget-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: postgres://auth:auth@postgres-auth:5432/auth_db
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth -d auth_db']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - familieoya

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  household-service:
    build:
      context: .
      dockerfile: apps/household-service/Dockerfile
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      NODE_ENV: development
      DATABASE_URL: postgres://household:household@postgres-household:5432/household_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres-household:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3002/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  transaction-service:
    build:
      context: .
      dockerfile: apps/transaction-service/Dockerfile
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      NODE_ENV: development
      DATABASE_URL: postgres://transaction:transaction@postgres-transaction:5432/transaction_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      postgres-transaction:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3003/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  budget-service:
    build:
      context: .
      dockerfile: apps/budget-service/Dockerfile
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      NODE_ENV: development
      DATABASE_URL: postgres://budget:budget@postgres-budget:5432/budget_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres-budget:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3004/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      NODE_ENV: development
      DATABASE_URL: postgres://notification:notification@postgres-notification:5432/notification_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3001
      HOUSEHOLD_SERVICE_URL: http://household-service:3002
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAILER_FROM: ${MAILER_FROM:-noreply@familieoya.no}
      APP_BASE_URL: ${APP_BASE_URL:-https://app.familieoya.furevikstrand.cloud}
    depends_on:
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3005/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - familieoya

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U notification -d notification_db']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - familieoya

  postgres-household:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: household_db
      POSTGRES_USER: household
      POSTGRES_PASSWORD: household
    volumes:
      - postgres-household-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U household -d household_db']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - familieoya

  postgres-transaction:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: transaction
      POSTGRES_PASSWORD: transaction
    volumes:
      - postgres-transaction-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U transaction -d transaction_db']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - familieoya

  postgres-budget:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: budget_db
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
    volumes:
      - postgres-budget-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U budget -d budget_db']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - familieoya

  shell:
    build:
      context: .
      dockerfile: apps/shell/Dockerfile
    ports:
      - '4200:80'
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - familieoya

  mfe-auth:
    build:
      context: .
      dockerfile: apps/mfe-auth/Dockerfile
    ports:
      - '4201:80'
    networks:
      - familieoya

  mfe-transaction:
    build:
      context: .
      dockerfile: apps/mfe-transaction/Dockerfile
    ports:
      - '4202:80'
    networks:
      - familieoya

  mfe-household:
    build:
      context: .
      dockerfile: apps/mfe-household/Dockerfile
    ports:
      - '4203:80'
    networks:
      - familieoya

  mfe-budget:
    build:
