  mfe-settings:
    build:
      context: .
      dockerfile: apps/mfe-settings/Dockerfile
    ports:
      - '4206:80'
    networks:
      - familieoya

volumes:
  postgres-auth-data:
  postgres-household-data:
  postgres-transaction-data:
  postgres-budget-data:
  postgres-notification-data:
  postgres-report-data:
  postgres-audit-data:

networks:
  familieoya:
    driver: bridge
