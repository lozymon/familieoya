name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for nx affected

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: nrwl/nx-set-shas@v4  # sets NX_BASE + NX_HEAD for affected

      - run: npx nx affected --target=lint --parallel=3
      - run: npx nx affected --target=test --parallel=3
      - run: npx nx affected --target=build --parallel=3 --configuration=production

  integration:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Generate test RS256 key pair and export to env
        run: |
          openssl genrsa -out test_private.pem 2048
          openssl rsa -in test_private.pem -pubout -out test_public.pem
          {
            echo "JWT_PRIVATE_KEY<<EOF"
            cat test_private.pem
            echo "EOF"
          } >> "$GITHUB_ENV"
          {
            echo "JWT_PUBLIC_KEY<<EOF"
            cat test_public.pem
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://test:test@localhost:5433/auth_test
          RABBITMQ_URL: amqp://localhost:5673
          INTERNAL_SECRET: ci-internal-secret

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
