server {
    listen 80;

    # API — strip /api prefix, forward to api-gateway
    location /api/ {
        proxy_pass http://api-gateway:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # Socket.IO WebSocket (real-time notifications)
    location /socket.io/ {
        proxy_pass http://api-gateway:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # MFE remotes
    location /remotes/auth/ {
        proxy_pass http://mfe-auth:80/;
    }

    location /remotes/transaction/ {
        proxy_pass http://mfe-transaction:80/;
    }

    location /remotes/household/ {
        proxy_pass http://mfe-household:80/;
    }

    location /remotes/budget/ {
        proxy_pass http://mfe-budget:80/;
    }

    location /remotes/reports/ {
        proxy_pass http://mfe-reports:80/;
    }

    location /remotes/settings/ {
        proxy_pass http://mfe-settings:80/;
    }

    # Shell — SPA catch-all
    location / {
        proxy_pass http://shell:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
